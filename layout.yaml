# CharmingMan Layout Configuration
# Supports 'floating' (absolute x,y) and 'tiled' (relative) windows.

windows:
  - id: "primary-chat"
    title: "Main Assistant"
    type: "chat"
    x: 2
    y: 1
    width: 60
    height: 25
    focused: true
    config:
      provider: "openai"
      model: "gpt-4o"
      use_rag: true

  - id: "stage"
    title: "The Stage"
    type: "document"
    x: 65
    y: 1
    width: 80
    height: 30
    config:
      content: "# System Ready\n\nInfinity Canvas initialized."

  - id: "tools"
    title: "Tool Belt"
    type: "tool"
    x: 65
    y: 32
    width: 40
    height: 10

  - id: "voice"
    title: "Voice Command"
    type: "voice"
    x: 110
    y: 32
    width: 35
    height: 10

  - id: "think-log"
    title: "Reasoning Trace"
    type: "chat"
    x: 2
    y: 28
    width: 60
    height: 15
    config:
      provider: "ollama"
      model: "llama3"
      persona: "You are a reasoning tracer. Summarize the logic of other agents."
